# ShipLoop — Project Configuration
# Copy to .shiploop/config.yaml and customize

# Model routing — override defaults per task type
# Agents already specify their model tier in frontmatter;
# these overrides let you tune per-project if needed.
routing:
  default: sonnet
  overrides:
    planner: opus
    security_auditor: opus
    boilerplate_gen: haiku
    gate_presenter: sonnet

# Gate policies — what must pass before gate approval is offered
gates:
  pre_merge:
    require_tests: true
    require_audit: true
    auto_approve: false
  issue_detected:
    auto_approve: false
  re_entry:
    auto_approve: false

# Test settings
test:
  # Auto-detect runner from project config (jest, vitest, pytest, go test)
  # Override here if auto-detect fails
  # runner: vitest
  keep_artifacts: false
  timeout: 120

# Audit settings
audit:
  security_model: opus
  quality_model: sonnet
  skip_security: false
  skip_quality: false

# Gate settings
gate:
  create_pr_draft: true
  require_clean_audit: false

# Ship settings
ship:
  # Tag format: v{iteration}.{YYYY-MM-DD} (e.g., v1.2026-02-28)
  tag_format: "v{iteration}.{date}"
  merge_pr: true
  push_remote: origin
  push_branch: main

# Observe settings
observe:
  # Observation window before declaring clean (minutes)
  window: 30
  # Enable Sentry MCP integration (auto-detected if not set)
  # sentry: true
  # Sentry project slug (auto-detected from git remote if not set)
  # sentry_project: my-project

# Triage settings
triage:
  # Max iterations before forcing manual intervention (prevents infinite loops)
  max_iterations: 5
  # Archive specs before triage overwrites them
  archive_specs: true

# Loop settings
loop:
  # Max iterations before forcing manual intervention
  max_iterations: 5
  # Auto-advance between phases (if false, stops at each gate)
  auto_advance: false
  # Fast lane: collapse spec+plan+build for trivial changes
  # Triggered by --fast flag on /sl-loop
  fast_lane: true

# MCP integration — ShipLoop adapts based on what's available
# No configuration needed; MCPs are auto-detected at runtime.
# Set explicit overrides here only if you want to force-disable an MCP.
mcp:
  # github: true
  # playwright: true
  # sentry: false
  # linear: false

# Handoff settings
handoffs:
  auto_generate: true
  on_gate: true
  on_phase_change: true
  on_session_end: true